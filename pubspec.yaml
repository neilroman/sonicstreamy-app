name: sonicstreamy
description: "Flutter app for streaming radio and downloading YouTube videos"
publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter  
  # Audio & Media
  just_audio: ^0.9.36
  audio_session: ^0.1.16
  
  # Video
  youtube_player_flutter: ^8.1.2
  video_player: ^2.8.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.1
  
  # State Management
  provider: ^6.0.0
  get: ^4.6.5
  
  # Database & Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Navigation
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  
  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  share_plus: ^7.2.0
  permission_handler: ^11.4.4
  
  # Download
  flutter_downloader: ^1.11.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
